{% extends 'user/base.html' %}

{% block title %}Register | TrustyShop{% endblock %}

{% block content %}
<div class="max-w-2xl auth-card p-8 sm:p-10 my-8">
    <div class="text-center">
        <div class="brand-icon-wrapper">
            <i class="fa-solid fa-user-plus"></i>
        </div>
        <h2 class="text-2xl font-bold text-white">Create Account</h2>
        <p class="text-slate-400 text-sm mt-1">Please fill in details to join TrustyShop</p>
    </div>

    <form class="mt-8 space-y-4" method="POST" action="{% url 'user:register' %}" enctype="multipart/form-data">
        {% csrf_token %}


        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="form-group">
                <label class="block text-sm font-medium text-slate-300 mb-1">Username</label>
                <div class="input-container">
                    <input type="text" name="username" required class="auth-input" placeholder="johndoe">
                    <i class="fa-solid fa-at input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label class="block text-sm font-medium text-slate-300 mb-1">Email Address</label>
                <div class="input-container">
                    <input type="email" name="email" required class="auth-input" placeholder="john@example.com">
                    <i class="fa-regular fa-envelope input-icon"></i>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="form-group">
                <label class="block text-sm font-medium text-slate-300 mb-1">Phone Number</label>
                <div class="input-container">
                    <input type="text" name="phone_number" required class="auth-input" placeholder="09xxxxxxxxx">
                    <i class="fa-solid fa-phone input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label class="block text-sm font-medium text-slate-300 mb-1">Gender</label>
                <div class="input-container">
                    <select name="gender" required class="auth-input">
                        <option value="" disabled selected>Select Gender</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                    <i class="fa-solid fa-venus-mars input-icon"></i>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="block text-sm font-medium text-slate-300 mb-1">Address</label>
            <div class="input-container">
                <input type="text" name="address" required class="auth-input" placeholder="No.123, Street, Yangon, Myanmar">
                <i class="fa-solid fa-location-dot input-icon"></i>
            </div>
        </div>

        <div class="form-group">
            <label class="block text-sm font-medium text-slate-300 mb-1">Profile Photo (Optional)</label>
            <div class="input-container">
                <input type="file" name="profile_pic" accept="image/*" class="auth-input pt-2.5">
                <i class="fa-regular fa-image input-icon"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="form-group">
                <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <div class="input-container">
                    <input type="password" name="password" required class="auth-input" placeholder="••••••••">
                    <i class="fa-solid fa-key input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label class="block text-sm font-medium text-slate-300 mb-1">Confirm Password</label>
                <div class="input-container">
                    <input type="password" name="confirm_password" required class="auth-input" placeholder="••••••••">
                    <i class="fa-solid fa-shield-halved input-icon"></i>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-primary w-full mt-4">
            <i class="fa-solid fa-user-plus"></i> Create Account
        </button>
    </form>

    <div class="text-center mt-6">
        <p class="text-sm text-slate-400">
            Already have an account?
            <a href="{% url 'user:login' %}" class="text-blue-400 font-semibold hover:text-blue-300 hover:underline ml-1">Sign in here</a>
        </p>
    </div>
</div>
{% endblock %}
